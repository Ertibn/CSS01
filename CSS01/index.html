<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile Card Grid</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- TEAM SECTION -->
<section class="team">

  <div class="card" id="U1">
    <img src="image/istockphoto-1300972574-1024x1024.jpg" class="profile-img">
    <h3>Genaye Debebe</h3>
    <p>Frontend Developer</p>

    <ul class="socials">
      <li>
        <a href="https://github.com/" target="_blank">
          <img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" width="20">
        </a>
      </li>
    </ul>

    <a href="#" class="email">Email</a>
  </div>

  <div class="card" id="U2">
    <img src="image/istockphoto-1398385367-1024x1024.jpg" class="profile-img">
    <h3>Simiret Nega</h3>
    <p>Backend Developer</p>

    <ul class="socials">
      <li>
        <a href="https://github.com/" target="_blank">
          <img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" width="20">
        </a>
      </li>
    </ul>

    <a href="#" class="email">Email</a>
  </div>

  <div class="card" id="U3">
    <img src="image/istockphoto-1437816897-1024x1024.jpg" class="profile-img">
    <h3>Merry Debebe</h3>
    <p>UI/UX Designer</p>

    <ul class="socials">
      <li>
        <a href="https://github.com/" target="_blank">
          <img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" width="20">
        </a>
      </li>
    </ul>

    <a href="#" class="email">Email</a>
  </div>

</section>

<!-- PRICING -->
<section class="box">
  <h2>Choose Your Plan</h2>

  <div class="Model">

    <div class="plan">
      <div class="price">
        <p>Starter</p>
        <h3>$20 / month</h3>
        <button>Add to cart</button>
      </div>
    </div>

    <div class="plan">
      <div class="price">
        <p>Advanced</p>
        <h3>$50 / month</h3>
        <button>Add to cart</button>
      </div>
    </div>

    <div class="plan">
      <div class="price">
        <p>Premium</p>
        <h3>$100 / month</h3>
        <button>Add to cart</button>
      </div>
    </div>

  </div>
</section>

<!-- HERO -->
<header class="hero">

  <img src="https://www.shutterstock.com/image-photo/two-happy-busy-female-employees-600nw-2429463807.jpg" class="hero-bg">

  <nav class="nav">
    <a href="#">Home</a>
    <a href="#">Features</a>
    <a href="#">Pricing</a>
  </nav>

  <div class="content">
    <h1>Welcome to Your Next Big Step</h1>
    <p>Build smarter and faster</p>
    <button id="startBtn">Get Started</button>
  </div>

</header>

<script src="script.js"></script>
</body>
</html>
